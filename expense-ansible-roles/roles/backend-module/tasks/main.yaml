- name: disable default nodejs module
  ansible.builtin.command: dnf module disable nodejs -y
- name: enable nodejs 20 module
  ansible.builtin.command: dnf module enable nodejs:20 -y
- name: install nodejs and mysql client
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop:
    - nodejs
    - mysql
- name: create expense user
  ansible.builtin.user:
    name: expense
    

- name: import tasks from common role
  ansible.builtin.import_role:
    name: common
    tasks_frorm: app-pre-req.yaml



- name: install backend dependencies
  ansible.builtin.command: npm install
  args:
    chdir: /app


- name: copy backend service file
  ansibile.builtin.template:
    src: backend.service.j2
    dest: /etc/systemd/system/backend.service

- name: install PyMysql
  ansible.builtin.pip:
    name:
      - PyMySQL
      - cryptography
    executable: pip3.9

- name: import mysql data
  comminity.mysql.mysql_db:
    login_user: "{{ mysql_user }}"
    login_password: "{{ mysql_root_password }}"
    login_host: "{{ mysql_host }}"
    target: /app/schema/backend.sql
    name: all
    state: import

- name: daemon reload
  ansible.builtin.systemd_service:
    name: backend
    state: restarted
    daemon_reload: true
